server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ───────────────────────────────────────────────────
    # Vite appends content hashes to filenames, so these are safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Always serve index.html for unknown routes so React client-side routing works.
    # Without this, refreshing the page on any sub-route returns a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
